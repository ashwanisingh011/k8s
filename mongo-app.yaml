apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deployment
  labels:
    app: mongo-secret
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mongo-secret
  template:
    metadata:
      labels:
        app: mongo-secret
    spec:
      containers:
      - name: mongo-secret
        image: mongo:8.0rc
        ports:
        - containerPort: 27017
    env:
      - name: MONGO_INITDB_ROOT_USERNAME 
        valueFrom:
          secretKeyRef:
            name: Secret
            key: mongo-user
      - name: MONGO_INITDB_ROOT_PASSWORD 
        valueFrom:
          secretKeyRef:
            name: Secret
            key: mongo-password 
